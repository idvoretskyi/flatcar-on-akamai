name: trivy

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly on Mondays at 07:00 UTC — catches newly-disclosed issues
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ── IaC / Terraform misconfiguration scan ──────────────────────────────────
  iac:
    name: iac misconfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Gate: fail on HIGH/CRITICAL misconfigs so the badge is meaningful
      - name: trivy config scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      # SARIF upload: full severity range → Security ▸ Code scanning tab
      - name: trivy config scan (sarif)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          format: sarif
          output: trivy-iac.sarif

      - name: upload iac sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ── Secret / filesystem scan ───────────────────────────────────────────────
  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: trivy fs scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "1"
          format: table

      - name: trivy fs scan (sarif)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "0"
          format: sarif
          output: trivy-secrets.sarif

      - name: upload secrets sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets
