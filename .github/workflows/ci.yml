name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: shellcheck scripts/*.sh scripts/lib/*.sh

  tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
      - name: fmt
        run: tofu -chdir=tofu fmt -check -recursive
      - name: validate
        run: |
          tofu -chdir=tofu init -backend=false
          tofu -chdir=tofu validate

  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: knuckle config is valid JSON
        run: jq -e . knuckle/config.json

  butane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: validate butane templates
        run: scripts/validate-butane.sh
