name: render-ignition

# Builds the patched knuckle fork and emits an Ignition artifact from
# knuckle/config.json. Manual trigger only — proves the knuckle backend
# end-to-end without needing Go locally.

on:
  workflow_dispatch:
    inputs:
      ssh_key:
        description: "SSH public key to embed (placeholder is fine for a test render)"
        required: false
        default: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA ci@test"
      hostname:
        description: "Hostname"
        required: false
        default: "flatcar-akamai"

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: render via knuckle backend
        env:
          SSH_AUTHORIZED_KEY: ${{ inputs.ssh_key }}
          NODE_HOSTNAME: ${{ inputs.hostname }}
          BACKEND: knuckle
        run: scripts/render-ignition.sh --backend knuckle
      - name: show summary
        run: |
          jq '{version: .ignition.version, users: [.passwd.users[].name], files: [.storage.files[].path]}' build/ignition.json
      - uses: actions/upload-artifact@v7
        with:
          name: ignition
          path: build/ignition.json
